<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技空间 - TechSpace</title>
    
    <!-- 安全配置：HSTS -->
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload">
    
    <!-- 安全配置模块 -->
    <script src="security-config.js"></script>
    
    <!-- Google Analytics 浏览统计 -->
    <script src="google-analytics.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景网格效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* 浮动粒子效果 */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite;
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 头部区域 */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
            z-index: 10;
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.9) 0%, transparent 100%);
        }

        .main-title {
            font-size: 4em;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00ffff, #00ff00, #00ffff, #ff00ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite, textGlow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            position: relative;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.6);
            }
            to {
                text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 255, 255, 0.8), 0 0 80px rgba(0, 255, 255, 0.6);
            }
        }

        .subtitle {
            font-size: 1.5em;
            color: #00ffff;
            letter-spacing: 15px;
            opacity: 0.9;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        /* 时间和温度显示 */
        .time-temp-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 200px;
            margin: 20px 0;
            padding: 15px 30px;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.05) 0%, rgba(0, 255, 255, 0.1) 50%, rgba(0, 255, 255, 0.05) 100%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            animation: timeTempGlow 2s ease-in-out infinite;
        }

        .time-temp-left,
        .time-temp-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .time-temp-label {
            font-size: 0.9em;
            color: rgba(0, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .time-temp-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
        }

        @keyframes timeTempGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            }
        }

        /* 科技装饰线 */
        .tech-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: lineGlow 3s ease-in-out infinite;
        }

        .tech-line.top {
            top: 20px;
            left: 0;
            width: 100%;
        }

        .tech-line.bottom {
            bottom: 20px;
            left: 0;
            width: 100%;
        }

        @keyframes lineGlow {
            0%, 100% {
                opacity: 0.3;
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(0, 255, 255, 1);
            }
        }

        /* 主要内容区域 */
        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* 分区网格布局 */
        .zones-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        /* 分区卡片 */
        .zone-card {
            background: rgba(16, 24, 48, 0.6);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            display: block;
        }

        .zone-card:hover {
            border-width: 4px;
            border-color: rgba(0, 255, 255, 1);
            transform: scale(1.05);
            box-shadow: 0 8px 40px rgba(0, 255, 255, 0.5);
            z-index: 100;
        }

        .zone-card:hover .zone-title {
            color: #00ff00;
            font-size: 1.4em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .zone-card:hover .zone-icon {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        /* 分区图标 */
        .zone-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #00ffff, #00ff00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        /* 分区标题 */
        .zone-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #00ffff;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 分区描述 */
        .zone-description {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.85em;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* 六边形背景装饰 */
        .hex-decoration {
            position: fixed;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(0, 255, 255, 0.1);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 1;
            animation: rotate 30s linear infinite;
        }

        .hex-decoration.hex1 { top: 20%; left: 5%; }
        .hex-decoration.hex2 { top: 60%; right: 5%; }
        .hex-decoration.hex3 { bottom: 10%; left: 15%; }
        .hex-decoration.hex4 { top: 40%; right: 15%; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .zones-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .zones-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .zones-grid {
                grid-template-columns: 1fr;
            }
            
            .main-title {
                font-size: 2.5em;
                padding: 15px 20px;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 39, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ffff, #00ff00);
            border-radius: 4px;
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 1s ease 2s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        .loading-text {
            font-size: 2em;
            color: #00ffff;
            letter-spacing: 5px;
            animation: loadingPulse 1s ease infinite;
        }

        @keyframes loadingPulse {
            0%, 100% {
                opacity: 0.5;
                text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(0, 255, 255, 1);
            }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->

    <!-- 浮动粒子 -->

    <script>
        // 更新时间和温度
        function updateTimeAndTemp() {
            const now = new Date();
            
            // 更新当前时间
            const currentTime = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('current-time').textContent = currentTime;
            
            // 更新温度（模拟）
            const temp = Math.floor(Math.random() * 5) + 23;
            document.getElementById('current-temp').textContent = temp + '°C';
        }

        // 动态生成更多粒子
        function createParticles() {
            const body = document.body;
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                body.appendChild(particle);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            updateTimeAndTemp();
            // 每秒更新时间
            setInterval(updateTimeAndTemp, 1000);
        });
    </script>
    <script src="user-interaction.js"></script>
    <!-- 跨设备留言系统 -->

    <!-- 访客统计系统 -->

    <!-- Cloudflare Analytics -->

</body>
</html>
